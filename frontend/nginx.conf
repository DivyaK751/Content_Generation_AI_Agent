server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Prevent nginx from including internal port in redirect URLs (Cloud Run terminates SSL on 443)
    port_in_redirect off;
    absolute_redirect off;

    # Dynamic session routes — only /_/index.html exists at build time, serve it for all UUIDs
    location ~ ^/sessions/ {
        try_files $uri $uri/ /sessions/_/index.html;
    }

    # Next.js static export with trailingSlash: true generates dir/index.html per route
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
